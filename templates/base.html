{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Panadería Digital{% endblock %}</title>
    
    <!-- favicon -->
    <link rel="icon" href="{% static 'img/pancito.png' %}" type="image/png">
    <link rel="icon" type="image/x-icon" href="{% static 'img/pancito.ico' %}">

    <!-- BOOTSTRAP -->
    <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
    rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>
<body>
    <nav class="navbar navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="{% static 'img/jumbo.png' %}" alt="Panadería Jumbo" width="40" height="40" class="d-inline-block align-text-top me-2">
        
            <span class="navbar-brand text-white" href="/">Panadería Jumbo</span>
        </a>
    </div>
</nav>


    <div class="container mb-5">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
